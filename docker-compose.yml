services:
  productcatalog.api:
    image: ${DOCKER_REGISTRY-}productcatalogapi
    build:
      context: .
      dockerfile: ProductCatalog.Api/Dockerfile

  productcatalog.db:
    image: postgres:16
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=product_catalog
      - POSTGRES_PASSWORD=admin
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
